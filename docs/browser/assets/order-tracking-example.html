<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suivi de Commande | Yalla Padel Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2DD4BF;
            --primary-dark: #14B8A6;
            --bg: #0F172A;
            --surface: #1E293B;
            --text: #F8FAFC;
            --text-muted: #94A3B8;
            --success: #22C55E;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 90%;
            max-width: 800px;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 2.5rem;
        }

        h1 { font-size: 2rem; font-weight: 600; color: var(--primary); }
        .order-id { font-family: monospace; color: var(--text-muted); font-size: 0.9rem; margin-top: 0.5rem; }

        .status-badge {
            background: rgba(34, 197, 94, 0.2);
            color: var(--success);
            padding: 0.5rem 1rem;
            border-radius: 99px;
            font-size: 0.85rem;
            font-weight: 600;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        /* Progress Bar */
        .tracking-viz {
            position: relative;
            display: flex;
            justify-content: space-between;
            margin: 4rem 0;
        }

        .tracking-viz::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--surface);
            z-index: 1;
        }

        .tracking-viz::after {
            content: '';
            position: absolute;
            top: 15px;
            left: 0;
            width: 66%; /* Progress */
            height: 4px;
            background: var(--primary);
            z-index: 2;
            box-shadow: 0 0 15px var(--primary);
            transition: width 1s ease-in-out;
        }

        .step {
            position: relative;
            z-index: 3;
            text-align: center;
            width: 100px;
        }

        .step-dot {
            width: 34px;
            height: 34px;
            background: var(--surface);
            border: 3px solid var(--surface);
            border-radius: 50%;
            margin: 0 auto 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.9rem;
            color: var(--text-muted);
            transition: all 0.3s;
        }

        .step.active .step-dot {
            background: var(--primary);
            border-color: var(--bg);
            color: var(--bg);
            box-shadow: 0 0 20px rgba(45, 212, 191, 0.4);
        }

        .step.completed .step-dot {
            background: var(--primary);
            border-color: var(--primary);
            color: var(--bg);
        }

        .step-label { font-size: 0.8rem; color: var(--text-muted); font-weight: 400; }
        .step.active .step-label { color: var(--text); font-weight: 600; }

        /* Map Placeholder */
        .map-placeholder {
            width: 100%;
            height: 250px;
            background: #1a2233;
            border-radius: 16px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .grid-lines {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .delivery-point {
            position: absolute;
            top: 40%;
            left: 60%;
            width: 12px;
            height: 12px;
            background: var(--primary);
            border: 3px solid white;
            border-radius: 50%;
            box-shadow: 0 0 15px var(--primary);
        }

        .delivery-pulse {
            position: absolute;
            top: 40%;
            left: 60%;
            width: 12px;
            height: 12px;
            background: var(--primary);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(4); opacity: 0; }
        }

        .footer-note {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .btn-close {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.5rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <button class="btn-close" onclick="window.close()">×</button>
        
        <div class="header">
            <div>
                <h1>Livraison en cours</h1>
                <div class="order-id" id="displayId">COMMANDE #---</div>
            </div>
            <div class="status-badge">Prévu aujourd'hui</div>
        </div>

        <div class="tracking-viz">
            <div class="step completed">
                <div class="step-dot">✓</div>
                <div class="step-label">Confirmée</div>
            </div>
            <div class="step completed">
                <div class="step-dot">✓</div>
                <div class="step-label">Préparée</div>
            </div>
            <div class="step active">
                <div class="step-dot">3</div>
                <div class="step-label">En route</div>
            </div>
            <div class="step">
                <div class="step-dot">4</div>
                <div class="step-label">Livrée</div>
            </div>
        </div>

        <div class="map-placeholder">
            <div class="grid-lines"></div>
            <div class="delivery-pulse"></div>
            <div class="delivery-point"></div>
            <div style="position: absolute; bottom: 15px; left: 15px; font-size: 0.7rem; color: rgba(255,255,255,0.2);">Simulation de géolocalisation LIVE</div>
        </div>

        <div class="footer-note">
            Les données de suivi sont mises à jour en temps réel par notre transporteur partenaire.
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('orderId');
        if (orderId) {
            document.getElementById('displayId').textContent = 'COMMANDE #' + orderId.toUpperCase();
        }
    </script>
</body>
</html>
