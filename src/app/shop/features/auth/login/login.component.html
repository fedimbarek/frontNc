<div class="auth-page">
  <div class="auth-card">
    <h1>Connexion</h1>
    <p class="auth-card__hint">Connectez-vous avec votre email et mot de passe.</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="form">
      <div class="form__group">
        <label for="email">Email</label>
        <input id="email" type="email" formControlName="email" placeholder="vous@exemple.com" autocomplete="email" />
        @if (form.get('email')?.invalid && form.get('email')?.touched) {
          <span class="form__error">Email invalide.</span>
        }
      </div>
      <div class="form__group">
        <label for="password">Mot de passe</label>
        <input id="password" type="password" formControlName="password" placeholder="••••••••" autocomplete="current-password" />
        @if (form.get('password')?.invalid && form.get('password')?.touched) {
          <span class="form__error">Mot de passe requis.</span>
        }
      </div>
      <button type="submit" class="btn btn--primary btn--block" [disabled]="form.invalid || submitting()">
        {{ submitting() ? 'Connexion…' : 'Se connecter' }}
      </button>
    </form>

    <p class="auth-card__footer">
      Pas encore de compte ? <a routerLink="/signup">S'inscrire</a>
    </p>
  </div>
</div>
