<form class="tf-form" [formGroup]="form" (ngSubmit)="submit()" novalidate>
  <div class="tf-grid">
    <div class="tf-field">
      <label for="tf-nom">Nom *</label>
      <input id="tf-nom" type="text" formControlName="nom" [class.error]="fieldInvalid('nom')" placeholder="Ex: Open Padel Cup" />
      <small *ngIf="fieldInvalid('nom')">Le nom est requis (min. 3 caractères).</small>
    </div>

    <div class="tf-row">
      <div class="tf-field">
        <label for="tf-debut">Date de début *</label>
        <input id="tf-debut" type="datetime-local" formControlName="dateDebut" [class.error]="fieldInvalid('dateDebut')" />
        <small *ngIf="fieldInvalid('dateDebut')">Requis.</small>
      </div>
      <div class="tf-field">
        <label for="tf-fin">Date de fin *</label>
        <input id="tf-fin" type="datetime-local" formControlName="dateFin" [class.error]="fieldInvalid('dateFin') || form.hasError('dateRange')" />
        <small *ngIf="form.hasError('dateRange') && form.touched">La date de fin doit être après la date de début.</small>
      </div>
    </div>

    <div class="tf-row">
      <div class="tf-field">
        <label for="tf-lieu">Lieu *</label>
        <input id="tf-lieu" type="text" formControlName="lieu" [class.error]="fieldInvalid('lieu')" placeholder="Ex: Tunis" />
      </div>
      <div class="tf-field">
        <label for="tf-capacite">Capacité *</label>
        <input id="tf-capacite" type="number" min="2" formControlName="capaciteMax" [class.error]="fieldInvalid('capaciteMax')" />
      </div>
    </div>

    <div class="tf-row">
      <div class="tf-field">
        <label for="tf-prix">Prix d'inscription</label>
        <input id="tf-prix" type="number" min="0" step="0.1" formControlName="prixInscription" />
      </div>
    </div>

    <div class="tf-field">
      <label for="tf-statut">Statut *</label>
      <select id="tf-statut" formControlName="statut">
        <option *ngFor="let item of statuses" [value]="item.value">{{ item.label }}</option>
      </select>
    </div>

    <div class="tf-field">
      <label for="tf-desc">Description</label>
      <textarea id="tf-desc" rows="4" formControlName="description" placeholder="Décrire le tournoi..."></textarea>
    </div>

    <div class="tf-error" *ngIf="errorMessage">{{ errorMessage }}</div>
  </div>

  <div class="tf-actions">
    <button type="button" class="tf-btn tf-btn--secondary" (click)="cancel()">Annuler</button>
    <button type="submit" class="tf-btn tf-btn--primary" [disabled]="isSubmitting">
      {{ isSubmitting ? 'Enregistrement...' : (editingId ? 'Mettre à jour' : 'Créer') }}
    </button>
  </div>
</form>
