<header class="top-bar">
  <div class="top-bar__container">
    <!-- Left Section: Logo & Brand -->
    <div class="top-bar__left">
      <div class="brand">
        <img src="assets/logo.jpg" alt="Logo" class="brand__logo" />
        <span class="brand__name" style="color: #0ea37a;">Yalla Padel</span>
      </div>
    </div>

    <!-- Center Section: Search (optional) -->
    <div class="top-bar__center">
      <div class="search-box">
        <svg class="search-box__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <circle cx="11" cy="11" r="8"/>
          <path d="M21 21l-4.35-4.35"/>
        </svg>
        <input 
          type="text" 
          class="search-box__input" 
          placeholder="Rechercher..."
          [(ngModel)]="searchQuery"
        />
      </div>
    </div>

    <!-- Right Section: Actions -->
    <div class="top-bar__right">
      <!-- Notifications -->
      <button class="action-btn" [class.has-badge]="notificationCount > 0" (click)="toggleNotifications()">
        <svg class="action-btn__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
       
      </button>

      <!-- Dark Mode Toggle -->
      <button class="action-btn" (click)="toggleDarkMode()">
        <svg *ngIf="!isDarkMode" class="action-btn__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <svg *ngIf="isDarkMode" class="action-btn__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>

      <!-- User Menu -->
      <div class="user-menu" [class.is-open]="isUserMenuOpen">
        <button class="user-menu__trigger" (click)="toggleUserMenu()">
        <img 
  class="user-menu__avatar" 
  [src]="userAvatar || 'assets/utilisateur.png'" 
  [alt]="userName"
  (error)="userAvatar = 'assets/utilisateur.png'"
/>
          <div class="user-menu__info">
            <span class="user-menu__name" *ngIf="currentUser">{{currentUser.firstName}}</span>
            <span class="user-menu__role" *ngIf="currentUser">{{currentUser.lastName}}</span>
          </div>
          <svg class="user-menu__chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </button>

        <!-- Dropdown Menu -->
        <div class="user-menu__dropdown" *ngIf="isUserMenuOpen">
          <a class="dropdown-item" (click)="navigateTo('profile')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            <span>Profil</span>
          </a>
          <a class="dropdown-item" (click)="navigateTo('settings')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <circle cx="12" cy="12" r="3"/>
              <path d="M12 1v6m0 6v6M5.64 5.64l4.24 4.24m4.24 4.24l4.24 4.24M1 12h6m6 0h6M5.64 18.36l4.24-4.24m4.24-4.24l4.24-4.24"/>
            </svg>
            <span>Paramètres</span>
          </a>
          <div class="dropdown-divider"></div>
       <a class="dropdown-item dropdown-item--danger" (click)="logout()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            <span>Déconnexion</span>
          </a>
        </div>
      </div>
    </div>
  </div>
</header>
