<div
  class="max-w-screen-xl mt-24 px-8 xl:px-16 mx-auto"
  id="about"
>

  <!-- TOP HERO SECTION -->
  <app-scroll-animation>
    <div
      class="grid grid-flow-row sm:grid-flow-col grid-rows-2 md:grid-rows-1 sm:grid-cols-2 gap-8 py-6 sm:py-16"
    >

      <!-- TEXT -->
      <div class="flex flex-col justify-center items-start row-start-2 sm:row-start-1">

        <h1 class="text-3xl lg:text-4xl xl:text-5xl font-medium text-black-600 leading-normal">
          Want anything to be easy with <strong>LaslesVPN</strong>.
        </h1>

        <p class="text-black-500 mt-4 mb-6">
          Provide a network for all your needs with ease and fun using
          LaslesVPN discover interesting features from us.
        </p>

        <button
          class="bg-orange-500 text-white px-6 py-3 rounded-lg shadow-md hover:bg-orange-600 transition"
        >
          Get Started
        </button>

      </div>

      <!-- IMAGE -->
      <div class="flex w-full">
        <div class="h-full w-full">
          <img
            src="assets/Illustration1.png"
            alt="VPN Illustration"
            class="w-full h-auto"
          />
        </div>
      </div>

    </div>
  </app-scroll-animation>

  <!-- STATS SECTION -->
  <div class="relative w-full flex">

    <app-scroll-animation
      className="rounded-lg w-full grid grid-cols-1 sm:grid-cols-3 py-9 divide-y-2 sm:divide-y-0 sm:divide-x-2 divide-gray-100 bg-white z-10"
    >

      <div
        *ngFor="let item of listUser; let i = index"
        class="flex items-center justify-start sm:justify-center py-4 sm:py-6 w-8/12 px-4 sm:w-auto mx-auto sm:mx-0"
      >
        <div class="flex mx-auto w-40 sm:w-auto">

          <div class="flex items-center justify-center bg-orange-100 w-12 h-12 mr-6 rounded-full">
            <img [src]="item.icon" class="h-6 w-6" />
          </div>

          <div class="flex flex-col">
            <p class="text-xl text-black-600 font-bold">
              {{ item.number }}+
            </p>
            <p class="text-lg text-black-500">
              {{ item.name }}
            </p>
          </div>

        </div>
      </div>

    </app-scroll-animation>

    <!-- Blur Background -->
    <div
      class="absolute bg-black opacity-5 w-11/12 rounded-lg h-64 sm:h-48 top-0 mt-8 mx-auto left-0 right-0"
      style="filter: blur(114px);"
    ></div>

  </div>

</div>
